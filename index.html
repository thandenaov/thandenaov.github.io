<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#0b0f14">
  <title>List Skin Bị Ảo Khi Dùng Unlock</title>

  <style>
    :root{
      --bg:#0b0f14;
      --panel:#10151c;
      --line:#1e2834;
      --text:#dfe8f1;
      --muted:#788797;
      --green:#45e3a3;
      --green2:#24bd82;
      --danger:#ff6b78;
    }

    *{box-sizing:border-box}

    html{scroll-behavior:smooth}

    body{
      margin:0;
      min-height:100vh;
      color:var(--text);
      background:
        radial-gradient(circle at 50% -20%,#172231 0,#0b0f14 42%),
        var(--bg);
      font-family:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;
      font-size:14px;
      line-height:1.65;
    }

    .page{
      width:min(820px,calc(100% - 22px));
      margin:0 auto;
      padding:24px 0 60px;
    }

    .window{
      overflow:hidden;
      border:1px solid var(--line);
      border-radius:10px;
      background:rgba(16,21,28,.96);
      box-shadow:0 26px 80px rgba(0,0,0,.45);
      animation:windowIn .55s ease both;
    }

    .dot:nth-child(1){background:#ff5f57}
    .dot:nth-child(2){background:#febc2e}
    .dot:nth-child(3){background:#28c840}

    .content{
      padding:22px 20px 28px;
    }

    .command .prompt{
      color:var(--green);
    }

    h1{
      margin:0;
      color:#f1f6fb;
      font-size:clamp(18px,4.5vw,25px);
      line-height:1.4;
      font-weight:700;
      letter-spacing:-.4px;
    }

    .search-wrap{
      position:relative;
      margin-bottom:12px;
    }

    .search-wrap::before{
      content:"/";
      position:absolute;
      left:13px;
      top:50%;
      transform:translateY(-50%);
      color:var(--green);
      font-weight:700;
    }

    #search{
      width:100%;
      height:44px;
      padding:0 78px 0 31px;
      border:1px solid var(--line);
      border-radius:7px;
      outline:none;
      background:#0a0f15;
      color:var(--text);
      font:inherit;
      font-size:13px;
      transition:border-color .2s,box-shadow .2s;
    }

    #search::placeholder{
      color:#536170;
    }

    #search:focus{
      border-color:rgba(69,227,163,.55);
      box-shadow:0 0 0 3px rgba(69,227,163,.07);
    }


    .info{
      display:flex;
      justify-content:flex-start;
      gap:12px;
      margin:0 2px 11px;
      color:#647386;
      font-size:11px;
    }

    .list{
      border-top:1px dashed #202b37;
    }

    .skin-row{
      display:flex;
      align-items:flex-start;
      gap:10px;
      padding:9px 7px;
      border-bottom:1px dashed rgba(41,54,69,.65);
      color:#dce6ef;
      opacity:0;
      transform:translateX(-7px);
      animation:rowIn .36s ease forwards;
      transition:background .16s,color .16s,padding-left .16s;
    }

    .skin-row:hover,
    .skin-row:active{
      padding-left:11px;
      color:#fff;
      background:rgba(69,227,163,.045);
    }

    .arrow{
      flex:0 0 auto;
      color:var(--green);
      font-weight:700;
    }

    .text{
      min-width:0;
      overflow-wrap:anywhere;
    }

    .hero-name{
      color:var(--green);
      font-weight:700;
    }

    .skin-name{
      color:#dce6ef;
    }

    mark{
      padding:0;
      color:#09110e;
      background:var(--green);
      border-radius:2px;
    }

    .empty{
      display:none;
      padding:28px 8px 8px;
      color:var(--danger);
      text-align:center;
      font-size:12px;
    }

    .footer{
      margin-top:20px;
      color:#526171;
      font-size:11px;
    }

    .footer span{
      color:var(--green2);
    }

    @keyframes windowIn{
      from{opacity:0;transform:translateY(12px)}
      to{opacity:1;transform:none}
    }

    @keyframes rowIn{
      to{opacity:1;transform:none}
    }

    @media(max-width:520px){
      .page{
        width:calc(100% - 10px);
        padding-top:5px;
      }

      .window{
        border-radius:7px;
      }

      .content{
        padding:12px 10px 18px;
      }

      body{
        font-size:13px;
      }

      .skin-row{
        padding:9px 4px;
      }

      .info{
        font-size:10px;
      }
    }

    @media(prefers-reduced-motion:reduce){
      *{
        animation:none!important;
        transition:none!important;
      }

      .skin-row{
        opacity:1;
        transform:none;
      }
    }
  
    .compact{
      padding:14px 14px 20px;
    }

    .compact .search-wrap{
      margin:0 0 12px;
    }

    .compact #search{
      height:46px;
      padding:0 14px;
      border-radius:8px;
      font-size:13px;
    }

    .compact .search-wrap::before{
      display:none;
    }

    .sr-only{
      position:absolute!important;
      width:1px!important;
      height:1px!important;
      padding:0!important;
      margin:-1px!important;
      overflow:hidden!important;
      clip:rect(0,0,0,0)!important;
      white-space:nowrap!important;
      border:0!important;
    }

    .compact .list{
      border-top:0;
    }

  
    .title-box{
      width:min(100%,560px);
      margin:0 auto 14px;
      padding:10px 14px;
      border:2px solid var(--green);
      border-radius:10px;
      color:var(--green);
      background:rgba(69,227,163,.055);
      text-align:center;
      font-size:clamp(15px,4vw,20px);
      font-weight:500;
      line-height:1.35;
      letter-spacing:.1px;
      box-shadow:
        inset 0 0 18px rgba(69,227,163,.035),
        0 0 0 1px rgba(69,227,163,.025);
    }

    .compact{
      padding-top:18px;
    }

    .compact .skin-row{
      padding-top:8px;
      padding-bottom:8px;
    }

    @media(max-width:520px){
      .title-box{
        margin-bottom:12px;
        padding:9px 10px;
        border-radius:9px;
        font-size:14px;
        white-space:nowrap;
      }

      .compact{
        padding-top:13px;
      }
    }

    @media(max-width:390px){
      .title-box{
        font-size:12.5px;
        letter-spacing:-.15px;
      }
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:flex-start;
      min-height:52px;
      padding:10px 15px 5px;
    }

    .dots{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .dot{
      display:block;
      width:13px;
      height:13px;
      border-radius:50%;
      box-shadow:0 0 12px rgba(255,255,255,.035);
    }

    .site-footer{
      padding:13px 16px 17px;
      border-top:1px solid rgba(41,54,69,.55);
      color:var(--green);
      text-align:center;
      font-size:13px;
      line-height:1.4;
    }

    .skin-row{
      font-size:16px;
      line-height:1.65;
    }

    .arrow{
      font-size:18px;
      line-height:1.45;
    }

    #search{
      font-size:15px;
    }

    @media(max-width:520px){
      body{
        font-size:16px;
      }

      .topbar{
        min-height:54px;
        padding:9px 12px 3px;
      }

      .dot{
        width:13px;
        height:13px;
      }

      .title-box{
        font-size:15px;
      }

      .compact #search{
        height:50px;
        font-size:15px;
      }

      .compact .skin-row{
        padding-top:10px;
        padding-bottom:10px;
        font-size:16px;
      }

      .arrow{
        font-size:18px;
      }

      .site-footer{
        font-size:13px;
      }
    }

    .skin-row{
      display:flex;
      align-items:center;
      flex-wrap:nowrap;
      white-space:nowrap;
      overflow-x:auto;
      overflow-y:hidden;
      scrollbar-width:none;
      -webkit-overflow-scrolling:touch;
    }

    .skin-row::-webkit-scrollbar{
      display:none;
    }

    .skin-row .arrow,
    .skin-row .hero,
    .skin-row .skin{
      flex:0 0 auto;
    }

    .dots-link{
      display:flex;
      align-items:center;
      gap:10px;
      width:max-content;
      padding:7px 5px;
      border-radius:10px;
      text-decoration:none;
      -webkit-tap-highlight-color:transparent;
      transition:transform .18s ease, background .18s ease;
    }

    .dots-link:hover,
    .dots-link:focus-visible{
      background:rgba(255,255,255,.04);
      outline:none;
    }

    .dots-link:active{
      transform:scale(.92);
    }

    .skin-row{
      opacity:0;
      transform:translateY(18px);
      transition:
        opacity .55s ease,
        transform .55s cubic-bezier(.2,.7,.2,1);
      will-change:opacity,transform;
    }

    .skin-row.is-visible{
      opacity:1;
      transform:translateY(0);
    }

    @media (prefers-reduced-motion: reduce){
      .skin-row{
        opacity:1;
        transform:none;
        transition:none;
      }
    }

    .skin-row{
      opacity:0;
      transform:translateY(7px);
      filter:blur(2px);
      transition:
        opacity .22s ease,
        transform .22s ease,
        filter .22s ease;
      will-change:opacity,transform,filter;
    }

    .skin-row.is-visible{
      opacity:1;
      transform:translateY(0);
      filter:blur(0);
    }

    .terminal-cursor{
      display:none;
      width:8px;
      height:15px;
      margin:7px 0 3px 9px;
      background:var(--green);
      animation:terminalBlink .7s steps(1) infinite;
    }

    .terminal-cursor.show{
      display:block;
    }

    @keyframes terminalBlink{
      0%,48%{opacity:1}
      49%,100%{opacity:0}
    }

    @media (prefers-reduced-motion: reduce){
      .skin-row{
        opacity:1;
        transform:none;
        filter:none;
        transition:none;
      }

      .terminal-cursor{
        display:none!important;
      }
    }


    /* ===== Bản tinh chỉnh giao diện & hiệu ứng ===== */
    .window{
      animation:windowEnter .72s cubic-bezier(.16,1,.3,1) both;
      transform-origin:50% 18%;
    }

    .topbar{
      animation:fadeDown .5s .08s cubic-bezier(.2,.8,.2,1) both;
    }

    .title-box{
      position:relative;
      overflow:hidden;
      animation:titleEnter .65s .14s cubic-bezier(.16,1,.3,1) both;
    }

    .title-box::after{
      content:"";
      position:absolute;
      inset:-40% auto -40% -35%;
      width:28%;
      transform:skewX(-18deg);
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.16),transparent);
      animation:titleSweep 1.15s .55s ease both;
      pointer-events:none;
    }

    .search-wrap{
      animation:searchEnter .6s .22s cubic-bezier(.16,1,.3,1) both;
    }

    .compact .list{
      overflow:hidden;
    }

    .compact .skin-row,
    .skin-row{
      padding-top:6px;
      padding-bottom:6px;
      line-height:1.42;
      opacity:1;
      filter:none;
      transform:none;
      animation:none;
      transition:background .18s ease,color .18s ease,padding-left .18s ease,opacity .28s ease,transform .36s cubic-bezier(.16,1,.3,1);
      will-change:opacity,transform;
    }

    .skin-row.row-enter{
      opacity:0;
      transform:translate3d(-12px,8px,0);
    }

    .skin-row.row-enter.is-visible{
      opacity:1;
      transform:translate3d(0,0,0);
    }

    .skin-row:hover,
    .skin-row:active{
      padding-left:10px;
      background:linear-gradient(90deg,rgba(69,227,163,.08),rgba(69,227,163,.018));
    }

    #search{
      -webkit-tap-highlight-color:transparent;
      transition:border-color .2s ease,box-shadow .2s ease,background .2s ease,transform .18s ease;
    }

    #search:focus{
      background:#0b1118;
      transform:translateY(-1px);
    }

    @keyframes windowEnter{
      from{opacity:0;transform:translateY(20px) scale(.985)}
      to{opacity:1;transform:translateY(0) scale(1)}
    }

    @keyframes fadeDown{
      from{opacity:0;transform:translateY(-10px)}
      to{opacity:1;transform:none}
    }

    @keyframes titleEnter{
      from{opacity:0;transform:translateY(12px) scale(.98);box-shadow:none}
      to{opacity:1;transform:none}
    }

    @keyframes searchEnter{
      from{opacity:0;transform:translateY(12px)}
      to{opacity:1;transform:none}
    }

    @keyframes titleSweep{
      from{left:-35%}
      to{left:125%}
    }

    @media(max-width:520px){
      .compact .skin-row,
      .skin-row{
        padding-top:5px;
        padding-bottom:5px;
        line-height:1.38;
      }
    }

    @media(prefers-reduced-motion:reduce){
      .window,.topbar,.title-box,.title-box::after,.search-wrap,.skin-row{
        animation:none!important;
        transition:none!important;
      }
      .skin-row.row-enter{
        opacity:1!important;
        transform:none!important;
      }
    }


    /* ===== Hiệu ứng nổi bật hơn (v2) ===== */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      z-index:-1;
      pointer-events:none;
      background-image:
        linear-gradient(rgba(69,227,163,.025) 1px,transparent 1px),
        linear-gradient(90deg,rgba(69,227,163,.025) 1px,transparent 1px);
      background-size:28px 28px;
      mask-image:linear-gradient(to bottom,rgba(0,0,0,.75),transparent 78%);
      animation:gridDrift 14s linear infinite;
    }

    .window{
      position:relative;
      isolation:isolate;
      box-shadow:0 22px 75px rgba(0,0,0,.5),0 0 38px rgba(69,227,163,.055);
    }

    .window::before{
      content:"";
      position:absolute;
      inset:-1px;
      z-index:-1;
      border-radius:inherit;
      background:linear-gradient(115deg,transparent 15%,rgba(69,227,163,.16),transparent 45%);
      background-size:240% 100%;
      opacity:.35;
      animation:borderFlow 6s linear infinite;
      pointer-events:none;
    }

    .dot{
      animation:dotPulse 2.4s ease-in-out infinite;
    }
    .dot:nth-child(2){animation-delay:.18s}
    .dot:nth-child(3){animation-delay:.36s}

    .title-box{
      text-shadow:0 0 16px rgba(69,227,163,.22);
      animation:titleEnter .7s .1s cubic-bezier(.16,1,.3,1) both,titleGlow 3s 1s ease-in-out infinite;
    }

    .search-wrap::after{
      content:"";
      position:absolute;
      left:10%;
      right:10%;
      bottom:-1px;
      height:1px;
      background:linear-gradient(90deg,transparent,var(--green),transparent);
      transform:scaleX(0);
      opacity:.75;
      transition:transform .35s ease;
      pointer-events:none;
    }
    .search-wrap:focus-within::after{transform:scaleX(1)}

    .skin-row{
      position:relative;
      overflow:hidden;
      transform-origin:left center;
    }

    .skin-row::before{
      content:"";
      position:absolute;
      inset:0;
      transform:translateX(-105%);
      background:linear-gradient(90deg,transparent,rgba(69,227,163,.085),transparent);
      pointer-events:none;
    }

    .skin-row.row-enter{
      opacity:0;
      transform:translate3d(-22px,8px,0) scale(.985);
    }

    .skin-row.row-enter.is-visible{
      opacity:1;
      transform:translate3d(0,0,0) scale(1);
    }

    .skin-row.row-enter.is-visible::before{
      animation:rowShine .72s ease-out both;
      animation-delay:calc(var(--row-index,0) * 28ms + 80ms);
    }

    .skin-row .arrow{
      opacity:0;
      transform:translateX(-10px) scale(.6);
    }

    .skin-row.is-visible .arrow{
      animation:arrowPop .42s cubic-bezier(.2,1.55,.4,1) forwards;
      animation-delay:calc(var(--row-index,0) * 32ms);
    }

    .skin-row .text{
      display:inline-block;
      opacity:0;
      clip-path:inset(0 100% 0 0);
      transform:translateY(5px);
    }

    .skin-row.is-visible .text{
      animation:textReveal .62s cubic-bezier(.16,1,.3,1) forwards;
      animation-delay:calc(var(--row-index,0) * 32ms + 70ms);
    }

    .site-footer{
      animation:footerEnter .7s .75s ease both;
      text-shadow:0 0 12px rgba(69,227,163,.14);
    }

    @keyframes textReveal{
      0%{opacity:0;clip-path:inset(0 100% 0 0);transform:translateY(5px);filter:blur(3px)}
      55%{opacity:1;filter:blur(0)}
      100%{opacity:1;clip-path:inset(0 0 0 0);transform:none;filter:none}
    }
    @keyframes arrowPop{
      0%{opacity:0;transform:translateX(-10px) scale(.55)}
      70%{opacity:1;transform:translateX(2px) scale(1.18)}
      100%{opacity:1;transform:none}
    }
    @keyframes rowShine{from{transform:translateX(-105%)}to{transform:translateX(105%)}}
    @keyframes titleGlow{0%,100%{box-shadow:inset 0 0 18px rgba(69,227,163,.04),0 0 0 1px rgba(69,227,163,.03)}50%{box-shadow:inset 0 0 24px rgba(69,227,163,.09),0 0 20px rgba(69,227,163,.10)}}
    @keyframes dotPulse{0%,100%{transform:scale(1);filter:brightness(1)}50%{transform:scale(1.12);filter:brightness(1.25)}}
    @keyframes borderFlow{to{background-position:-240% 0}}
    @keyframes gridDrift{to{background-position:28px 28px}}
    @keyframes footerEnter{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

    @media(max-width:520px){
      .skin-row.is-visible .text{animation-duration:.52s}
      .skin-row.row-enter.is-visible::before{animation-duration:.58s}
    }

  </style>
</head>

<body>
  <main class="page">
    <section class="window">
      <div class="topbar">
        <a class="dots dots-link"
           href="https://thandenaov.com/"
           aria-label="Mở website Thần Đèn"
           title="Mở thandenaov.com">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </a>
      </div>

      <div class="content compact">
        <div class="title-box">List Skin Bị Ảo Khi Dùng Unlock</div>

        <div class="search-wrap">
          <input id="search" type="search" placeholder="Tìm tướng hoặc skin..." autocomplete="off">
        </div>
        <span id="resultCount" class="sr-only">0 kết quả</span>

        <div class="list" id="skinList"></div>
        <div class="terminal-cursor" id="terminalCursor" aria-hidden="true"></div>
        <div class="empty" id="empty">Không tìm thấy tướng hoặc skin phù hợp.</div>
      </div>

      <footer class="site-footer">2026 Thần Đèn</footer>
    </section>
  </main>

  <script>
    /*
      Thứ tự tướng bên dưới chính là mức độ ưu tiên phổ biến.
      Muốn đổi vị trí tướng nào, chỉ cần đổi vị trí tên tướng trong mảng HERO_PRIORITY.
    */
    const HERO_PRIORITY = [
      "Nakroth","Billow","Baron","Aoi","Violet","Hayate","Tel'Annas",
      "Lauriel","Krixi","Tulen","Yorn","Airi","Capheny","Ayan","Aya",
      "Qi","Veres","Veera","Ilumia","Điêu Thuyền","Eland'orr","Iggy",
      "Dolia","Bijan","Stuart","Pain","Erin","Cresh","Yue"
    ];

    const RAW_SKINS = [
      ["Airi","Bích Hải Thánh Nữ"],
      ["Aoi","Mikasa"],
      ["Aya","Công Chúa Cầu Vồng"],
      ["Baron","Thiên Phù - Tư Mệnh"],
      ["Bijan","Lữ Hành Thời Không"],
      ["Billow","Thiên Tướng - Độ Ách"],
      ["Capheny","Càn Nguyên Điện Chủ"],
      ["Cresh","Eren"],
      ["Dolia","Mã Khởi Thiên Ca"],
      ["Eland'orr","Mộng Giới Yêu Chủ"],
      ["Erin","Nguyệt Ảnh Minh Điệp"],
      ["Hayate","Siêu Đạo Chích Kid"],
      ["Hayate","Tu Di Thánh Đế"],
      ["Iggy","Rimuru"],
      ["Ilumia","Lưỡng Nghi Long Hậu"],
      ["Krixi","Phù Thủy Thời Không"],
      ["Krixi","Tatsumaki Lốc Xoáy Kinh Hoàng"],
      ["Lauriel","Mã Đăng Cứu Thế"],
      ["Lauriel","Thứ Nguyên Vệ Thần"],
      ["Nakroth","Bạch Diện Chiến Thương"],
      ["Nakroth","Levi"],
      ["Nakroth","Quỷ Thương Liệp Đế"],
      ["Pain","Megumi Fushiguro"],
      ["Qi","Milim Nava"],
      ["Stuart","Siêu Trùm Phản Diện"],
      ["Tel'Annas","Lân Quang Thánh Điệu"],
      ["Tel'Annas","Tân Niên Vệ Thần"],
      ["Tel'Annas","Thần Sứ F.E.E-X1"],
      ["Tulen","Thiên Cơ Bạch Trạch"],
      ["Veera","Thất Sát - Thượng Sinh"],
      ["Veres","Lưu Ly Long Mẫu"],
      ["Violet","Huyết Ma Thần"],
      ["Violet","Nobara Kugisaki"],
      ["Violet","Thần Long Tỷ Tỷ"],
      ["Violet","Vọng Nguyệt Long Cơ"],
      ["Violet","Vợ Người Ta"],
      ["Yorn","Conan Edogawa"],
      ["Yue","Trảm Kim Ánh Nguyệt"],
      ["Điêu Thuyền","Nhật Nguyệt Thánh Linh"]
    ];

    const listEl = document.getElementById("skinList");
    const searchEl = document.getElementById("search");
    const countEl = document.getElementById("resultCount");
    const emptyEl = document.getElementById("empty");
    const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    let firstRender = true;
    let renderToken = 0;

    function normalizeText(value){
      return value.normalize("NFD")
        .replace(/[\u0300-\u036f]/g,"")
        .replace(/đ/g,"d").replace(/Đ/g,"D")
        .toLowerCase().trim();
    }

    function priorityOf(hero){
      const index = HERO_PRIORITY.indexOf(hero);
      return index === -1 ? 9999 : index;
    }

    function sortedSkins(){
      return [...RAW_SKINS].sort((a,b)=>{
        const heroPriority = priorityOf(a[0]) - priorityOf(b[0]);
        if(heroPriority !== 0) return heroPriority;
        const lengthDifference = a[1].length - b[1].length;
        if(lengthDifference !== 0) return lengthDifference;
        return a[1].localeCompare(b[1],"vi");
      });
    }

    function escapeHTML(value){
      return value.replace(/[&<>"']/g,char=>({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      })[char]);
    }

    function highlight(value,query){
      if(!query) return escapeHTML(value);
      const normalizedValue = normalizeText(value);
      const index = normalizedValue.indexOf(query);
      if(index === -1) return escapeHTML(value);
      const before = value.slice(0,index);
      const match = value.slice(index,index + query.length);
      const after = value.slice(index + query.length);
      return `${escapeHTML(before)}<mark>${escapeHTML(match)}</mark>${escapeHTML(after)}`;
    }

    function animateRows(rows, isSearch){
      if(reducedMotion){
        rows.forEach(row=>row.classList.add("is-visible"));
        return;
      }

      const token = ++renderToken;
      rows.forEach((row,index)=>{
        row.classList.add("row-enter");
        const delay = isSearch ? Math.min(index * 28, 180) : Math.min(index * 58, 720);
        setTimeout(()=>{
          if(token !== renderToken) return;
          row.classList.add("is-visible");
        }, 70 + delay);
      });
    }

    function render(){
      const query = normalizeText(searchEl.value);
      const filtered = sortedSkins().filter(([hero,skin])=>
        normalizeText(`${hero} ${skin}`).includes(query)
      );

      listEl.innerHTML = "";
      const fragment = document.createDocumentFragment();
      const rows = [];

      filtered.forEach(([hero,skin],index)=>{
        const row = document.createElement("div");
        row.className = "skin-row";
        row.style.setProperty("--row-index", Math.min(index, 14));
        row.innerHTML = `
          <span class="arrow">➜</span>
          <span class="text">
            <span class="hero-name">${highlight(hero,query)}</span>
            <span class="skin-name"> ${highlight(skin,query)}</span>
          </span>`;
        rows.push(row);
        fragment.appendChild(row);
      });

      listEl.appendChild(fragment);
      countEl.textContent = `${filtered.length} kết quả`;
      emptyEl.style.display = filtered.length ? "none" : "block";
      animateRows(rows, !firstRender);
      firstRender = false;
    }

    searchEl.addEventListener("input",render);

    document.addEventListener("keydown",event=>{
      if((event.ctrlKey || event.metaKey) && event.key.toLowerCase()==="k"){
        event.preventDefault();
        searchEl.focus();
      }
      if(event.key==="Escape"){
        searchEl.value="";
        render();
        searchEl.blur();
      }
    });

    render();
  </script>

</body>
</html>
