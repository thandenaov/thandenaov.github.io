<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#0b0f14">
  <title>List Skin Bị Ảo Khi Dùng Unlock</title>

  <style>
    :root{
      --bg:#0b0f14;
      --panel:#10151c;
      --line:#1e2834;
      --text:#dfe8f1;
      --muted:#788797;
      --green:#45e3a3;
      --green2:#24bd82;
      --danger:#ff6b78;
    }

    *{box-sizing:border-box}

    html{scroll-behavior:smooth}

    body{
      margin:0;
      min-height:100vh;
      color:var(--text);
      background:
        radial-gradient(circle at 50% -20%,#172231 0,#0b0f14 42%),
        var(--bg);
      font-family:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;
      font-size:14px;
      line-height:1.65;
    }

    .page{
      width:min(820px,calc(100% - 22px));
      margin:0 auto;
      padding:24px 0 60px;
    }

    .window{
      overflow:hidden;
      border:1px solid var(--line);
      border-radius:10px;
      background:rgba(16,21,28,.96);
      box-shadow:0 26px 80px rgba(0,0,0,.45);
      animation:windowIn .55s ease both;
    }

    .window-bar{
      height:48px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:0 15px;
      border-bottom:1px solid var(--line);
      background:#0d1218;
    }

    .dots{
      display:flex;
      gap:7px;
    }

    .dot{
      width:10px;
      height:10px;
      border-radius:50%;
    }

    .dot:nth-child(1){background:#ff5f57}
    .dot:nth-child(2){background:#febc2e}
    .dot:nth-child(3){background:#28c840}

    .path{
      overflow:hidden;
      color:#637182;
      font-size:11px;
      white-space:nowrap;
      text-overflow:ellipsis;
    }

    .content{
      padding:22px 20px 28px;
    }

    .command{
      margin-bottom:9px;
      color:var(--muted);
      font-size:12px;
    }

    .command .prompt{
      color:var(--green);
    }

    h1{
      margin:0;
      color:#f1f6fb;
      font-size:clamp(18px,4.5vw,25px);
      line-height:1.4;
      font-weight:700;
      letter-spacing:-.4px;
    }

    .cursor{
      display:inline-block;
      width:8px;
      height:1.05em;
      margin-left:5px;
      vertical-align:-2px;
      background:var(--green);
      animation:blink 1s step-end infinite;
    }

    .description{
      margin:8px 0 20px;
      color:var(--muted);
      font-size:12px;
    }

    .search-wrap{
      position:relative;
      margin-bottom:12px;
    }

    .search-wrap::before{
      content:"/";
      position:absolute;
      left:13px;
      top:50%;
      transform:translateY(-50%);
      color:var(--green);
      font-weight:700;
    }

    #search{
      width:100%;
      height:44px;
      padding:0 78px 0 31px;
      border:1px solid var(--line);
      border-radius:7px;
      outline:none;
      background:#0a0f15;
      color:var(--text);
      font:inherit;
      font-size:13px;
      transition:border-color .2s,box-shadow .2s;
    }

    #search::placeholder{
      color:#536170;
    }

    #search:focus{
      border-color:rgba(69,227,163,.55);
      box-shadow:0 0 0 3px rgba(69,227,163,.07);
    }

    .shortcut{
      position:absolute;
      right:10px;
      top:50%;
      transform:translateY(-50%);
      padding:2px 7px;
      border:1px solid var(--line);
      border-radius:4px;
      color:#657487;
      background:#101720;
      font-size:10px;
    }

    .info{
      display:flex;
      justify-content:space-between;
      gap:12px;
      margin:0 2px 11px;
      color:#647386;
      font-size:11px;
    }

    .list{
      border-top:1px dashed #202b37;
    }

    .skin-row{
      display:flex;
      align-items:flex-start;
      gap:10px;
      padding:9px 7px;
      border-bottom:1px dashed rgba(41,54,69,.65);
      color:#dce6ef;
      opacity:0;
      transform:translateX(-7px);
      animation:rowIn .36s ease forwards;
      transition:background .16s,color .16s,padding-left .16s;
    }

    .skin-row:hover,
    .skin-row:active{
      padding-left:11px;
      color:#fff;
      background:rgba(69,227,163,.045);
    }

    .arrow{
      flex:0 0 auto;
      color:var(--green);
      font-weight:700;
    }

    .text{
      min-width:0;
      overflow-wrap:anywhere;
    }

    .hero-name{
      color:var(--green);
      font-weight:700;
    }

    .skin-name{
      color:#dce6ef;
    }

    mark{
      padding:0;
      color:#09110e;
      background:var(--green);
      border-radius:2px;
    }

    .empty{
      display:none;
      padding:28px 8px 8px;
      color:var(--danger);
      text-align:center;
      font-size:12px;
    }

    .footer{
      margin-top:20px;
      color:#526171;
      font-size:11px;
    }

    .footer span{
      color:var(--green2);
    }

    @keyframes windowIn{
      from{opacity:0;transform:translateY(12px)}
      to{opacity:1;transform:none}
    }

    @keyframes rowIn{
      to{opacity:1;transform:none}
    }

    @keyframes blink{
      0%,45%{opacity:1}
      46%,100%{opacity:0}
    }

    @media(max-width:520px){
      .page{
        width:calc(100% - 10px);
        padding-top:5px;
      }

      .window{
        border-radius:7px;
      }

      .window-bar{
        height:43px;
        padding:0 12px;
      }

      .content{
        padding:18px 13px 23px;
      }

      body{
        font-size:13px;
      }

      .skin-row{
        padding:9px 4px;
      }

      .info{
        font-size:10px;
      }
    }

    @media(prefers-reduced-motion:reduce){
      *{
        animation:none!important;
        transition:none!important;
      }

      .skin-row{
        opacity:1;
        transform:none;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="window">
      <div class="window-bar">
        <div class="dots">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
        <div class="path">/autoup/note_list_skin</div>
      </div>

      <div class="content">
        <div class="command"><span class="prompt">visitor@thandenaov</span>:~$ cat note_list_skin.txt</div>

        <h1>List Skin Bị Ảo Khi Dùng Unlock<span class="cursor"></span></h1>
        <p class="description">Tìm nhanh theo tên tướng hoặc tên skin.</p>

        <div class="search-wrap">
          <input id="search" type="search" placeholder="Tìm tướng hoặc skin..." autocomplete="off">
          <span class="shortcut">CTRL K</span>
        </div>

        <div class="info">
          <span id="resultCount">0 kết quả</span>
          <span>Ưu tiên phổ biến • skin ngắn → dài</span>
        </div>

        <div class="list" id="skinList"></div>
        <div class="empty" id="empty">Không tìm thấy tướng hoặc skin phù hợp.</div>

        <div class="footer">
          <span>✓</span> Danh sách đã được sắp xếp tự động.
        </div>
      </div>
    </section>
  </main>

  <script>
    /*
      Thứ tự tướng bên dưới chính là mức độ ưu tiên phổ biến.
      Muốn đổi vị trí tướng nào, chỉ cần đổi vị trí tên tướng trong mảng HERO_PRIORITY.
    */
    const HERO_PRIORITY = [
      "Nakroth",
      "Billow",
      "Baron",
      "Aoi",
      "Violet",
      "Hayate",
      "Tel'Annas",
      "Lauriel",
      "Krixi",
      "Tulen",
      "Yorn",
      "Airi",
      "Capheny",
      "Ayan",
      "Aya",
      "Qi",
      "Veres",
      "Veera",
      "Ilumia",
      "Điêu Thuyền",
      "Eland'orr",
      "Iggy",
      "Dolia",
      "Bijan",
      "Stuart",
      "Pain",
      "Erin",
      "Cresh",
      "Yue"
    ];

    const RAW_SKINS = [
      ["Airi","Bích Hải Thánh Nữ"],
      ["Aoi","Mikasa"],
      ["Aya","Công Chúa Cầu Vồng"],
      ["Baron","Thiên Phù - Tư Mệnh"],
      ["Bijan","Lữ Hành Thời Không"],
      ["Billow","Thiên Tướng - Độ Ách"],
      ["Capheny","Càn Nguyên Điện Chủ"],
      ["Cresh","Eren"],
      ["Dolia","Mã Khởi Thiên Ca"],
      ["Eland'orr","Mộng Giới Yêu Chủ"],
      ["Erin","Nguyệt Ảnh Minh Điệp"],
      ["Hayate","Siêu Đạo Chích Kid"],
      ["Hayate","Tu Di Thánh Đế"],
      ["Iggy","Rimuru"],
      ["Ilumia","Lưỡng Nghi Long Hậu"],
      ["Krixi","Phù Thủy Thời Không"],
      ["Krixi","Tatsumaki Lốc Xoáy Kinh Hoàng"],
      ["Lauriel","Mã Đăng Cứu Thế"],
      ["Lauriel","Thứ Nguyên Vệ Thần"],
      ["Nakroth","Bạch Diện Chiến Thương"],
      ["Nakroth","Levi"],
      ["Nakroth","Quỷ Thương Liệt Đế"],
      ["Pain","Megumi Fushiguro"],
      ["Qi","Milim Nava"],
      ["Stuart","Siêu Trùm Phản Diện"],
      ["Tel'Annas","Lân Quang Thánh Điệu"],
      ["Tel'Annas","Tân Niên Vệ Thần"],
      ["Tel'Annas","Thần Sứ F.E.E-X1"],
      ["Tulen","Thiên Cơ Bạch Trạch"],
      ["Veera","Thất Sát - Thượng Sinh"],
      ["Veres","Lưu Ly Long Mẫu"],
      ["Violet","Huyết Ma Thần"],
      ["Violet","Nobara Kugisaki"],
      ["Violet","Thần Long Tỷ Tỷ"],
      ["Violet","Vọng Nguyệt Long Cơ"],
      ["Violet","Vợ Người Ta"],
      ["Yorn","Conan Edogawa"],
      ["Yue","Trảm Kim Ánh Nguyệt"],
      ["Điêu Thuyền","Nhật Nguyệt Thánh Linh"]
    ];

    const listEl = document.getElementById("skinList");
    const searchEl = document.getElementById("search");
    const countEl = document.getElementById("resultCount");
    const emptyEl = document.getElementById("empty");

    function normalizeText(value){
      return value
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g,"")
        .replace(/đ/g,"d")
        .replace(/Đ/g,"D")
        .toLowerCase()
        .trim();
    }

    function priorityOf(hero){
      const index = HERO_PRIORITY.indexOf(hero);
      return index === -1 ? 9999 : index;
    }

    function sortedSkins(){
      return [...RAW_SKINS].sort((a,b)=>{
        const heroPriority = priorityOf(a[0]) - priorityOf(b[0]);
        if(heroPriority !== 0) return heroPriority;

        const lengthDifference = a[1].length - b[1].length;
        if(lengthDifference !== 0) return lengthDifference;

        return a[1].localeCompare(b[1],"vi");
      });
    }

    function escapeHTML(value){
      return value.replace(/[&<>"']/g,char=>({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#039;"
      })[char]);
    }

    function highlight(value,query){
      if(!query) return escapeHTML(value);

      const normalizedValue = normalizeText(value);
      const index = normalizedValue.indexOf(query);

      if(index === -1) return escapeHTML(value);

      /*
        Với tiếng Việt có dấu, vị trí chữ sau normalize có thể lệch nhẹ.
        Vì vậy chỉ highlight chính xác khi độ dài tương ứng an toàn.
      */
      const before = value.slice(0,index);
      const match = value.slice(index,index + query.length);
      const after = value.slice(index + query.length);

      return `${escapeHTML(before)}<mark>${escapeHTML(match)}</mark>${escapeHTML(after)}`;
    }

    function render(){
      const query = normalizeText(searchEl.value);
      const filtered = sortedSkins().filter(([hero,skin])=>
        normalizeText(`${hero} ${skin}`).includes(query)
      );

      listEl.innerHTML = "";

      filtered.forEach(([hero,skin],index)=>{
        const row = document.createElement("div");
        row.className = "skin-row";
        row.style.animationDelay = `${Math.min(index * 22,260)}ms`;
        row.innerHTML = `
          <span class="arrow">➜</span>
          <span class="text">
            <span class="hero-name">${highlight(hero,query)}</span>
            <span class="skin-name"> ${highlight(skin,query)}</span>
          </span>
        `;
        listEl.appendChild(row);
      });

      countEl.textContent = `${filtered.length} kết quả`;
      emptyEl.style.display = filtered.length ? "none" : "block";
    }

    searchEl.addEventListener("input",render);

    document.addEventListener("keydown",event=>{
      if((event.ctrlKey || event.metaKey) && event.key.toLowerCase()==="k"){
        event.preventDefault();
        searchEl.focus();
      }

      if(event.key==="Escape"){
        searchEl.value="";
        render();
        searchEl.blur();
      }
    });

    render();
  </script>
</body>
</html>
